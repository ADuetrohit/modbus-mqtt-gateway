name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  simulate:
    name: Build and simulate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Install Wokwi CLI
        run: |
          curl -L https://wokwi.com/ci/install.sh | sh
          # The installer's target directory is not documented and has moved
          # before; resolve it instead of hardcoding a path.
          cli="$(command -v wokwi-cli || find "$HOME" /usr/local/bin -name 'wokwi-cli' -type f 2>/dev/null | head -n1)"
          if [ -z "$cli" ]; then
            echo "wokwi-cli not found after install" >&2
            exit 1
          fi
          echo "Found wokwi-cli at $cli"
          echo "$(dirname "$cli")" >> "$GITHUB_PATH"

      - name: Compile custom chip to WASM
        run: |
          wokwi-cli chip compile chips/energy-meter.chip.c \
            -o chips/energy-meter.chip.wasm

      - name: Build firmware
        run: pio run

      # The Wokwi API intermittently drops the websocket right after a
      # successful connect (close code 1006), often enough to fail roughly half
      # of all runs across three sequential sessions. That is a transport fault,
      # not a firmware fault, so it is retried — but ONLY it. A failed assertion
      # is a real regression and still fails on the first attempt, so this can
      # never paper over a genuine bug.
      - name: Simulate all scenarios
        env:
          WOKWI_CLI_TOKEN: ${{ secrets.WOKWI_CLI_TOKEN }}
        run: |
          run_scenario() {
            scenario="$1"
            timeout="$2"
            for attempt in 1 2 3; do
              echo "::group::$scenario (attempt $attempt)"
              if out=$(wokwi-cli . --scenario "$scenario" --timeout "$timeout" 2>&1); then
                echo "$out"
                echo "::endgroup::"
                return 0
              fi
              echo "$out"
              echo "::endgroup::"

              if echo "$out" | grep -q 'code 1006'; then
                echo "::warning::$scenario hit the Wokwi 1006 transport flake on attempt $attempt; retrying"
                sleep 10
                continue
              fi

              echo "::error::$scenario failed an assertion"
              return 1
            done
            echo "::error::$scenario still hitting 1006 after 3 attempts"
            return 1
          }

          run_scenario test/meter-poll.scenario.yaml 60000
          run_scenario test/fault-injection.scenario.yaml 90000
          run_scenario test/mqtt-publish.scenario.yaml 60000

; Pinned to espressif32 6.x (Arduino core 2.0.x) because main.cpp uses the
; two-argument esp_task_wdt_init(timeout, panic). Arduino core 3.x replaced it
; with a config-struct overload; bump this and that call must change too.

[env:esp32-s3-devkitc-1]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit GFX Library@^1.11.9

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DMQTT_MAX_PACKET_SIZE=512
